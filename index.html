<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTUR GYM - Control de Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --astur-blue: #0066bc; --astur-yellow: #f9d71c; }
        body { background-color: var(--astur-blue); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .astur-gradient { background: linear-gradient(135deg, var(--astur-blue) 0%, #004a87 100%); }
        .access-card { transition: all 0.3s ease-in-out; border-radius: 1.5rem; overflow: hidden; }
        .status-success { border-color: #22c55e; background-color: rgba(255, 255, 255, 1); color: #16a34a; }
        .status-error { border-color: #ef4444; background-color: rgba(255, 255, 255, 1); color: #dc2626; }
        #access-log::-webkit-scrollbar { width: 6px; }
        #access-log::-webkit-scrollbar-thumb { background: var(--astur-yellow); border-radius: 10px; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake-error { animation: shake 0.5s ease-in-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="astur-gradient flex items-center justify-center p-6">

    <div class="flex w-full max-w-7xl gap-6 h-[85vh]">
        <div id="view-client" class="flex-1 text-center flex flex-col justify-center">
            <img src="https://i.ibb.co/svknfxSq/541227282-18045312167644134-5085573338939708126-n.jpg" alt="Astur Gym Logo" class="w-40 mx-auto mb-4 drop-shadow-lg">
            <h1 class="text-5xl font-black text-astur-yellow mb-6 tracking-tighter italic uppercase">ASTUR GYM</h1>
            
            <div class="bg-white/10 backdrop-blur-md p-8 rounded-3xl shadow-2xl border border-white/20">
                <p class="text-white text-xl mb-4 font-bold uppercase tracking-widest" id="status-indicator">Cargando socios...</p>
                <input type="text" id="main-input" autofocus 
                    class="w-full bg-white text-astur-blue text-5xl font-bold text-center py-5 rounded-2xl border-4 border-astur-yellow focus:outline-none shadow-inner"
                    placeholder="00000000" onkeyup="handleInput(event)">
                
                <div id="display-result" class="hidden mt-6 p-6 bg-white border-8 access-card relative shadow-2xl shadow-black/50">
                    <img src="https://i.ibb.co/svknfxSq/541227282-18045312167644134-5085573338939708126-n.jpg" class="absolute top-4 right-4 w-12 opacity-20">
                    
                    <div class="flex items-center gap-8">
                        <img id="res-foto" src="https://www.w3schools.com/howto/img_avatar.png" class="w-44 h-44 rounded-2xl object-cover border-4 border-astur-blue shadow-lg">
                        <div class="text-left flex-1">
                            <h2 id="res-nombre" class="text-4xl font-black uppercase text-gray-800 leading-tight border-b-2 border-gray-100 pb-2 mb-2"></h2>
                            <p id="res-dni" class="text-xl font-bold text-gray-400 mb-4 uppercase tracking-tighter"></p>
                            <div id="res-status-badge" class="inline-block px-6 py-2 rounded-xl text-2xl font-black text-white shadow-md uppercase"></div>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="showAdminLogin()" class="mt-6 text-white/40 hover:text-astur-yellow transition font-bold text-sm tracking-widest uppercase">Administración</button>
        </div>

        <div class="w-80 bg-black/30 backdrop-blur-md rounded-3xl border border-white/10 flex flex-col overflow-hidden shadow-2xl">
            <div class="bg-white/10 p-4 text-center border-b border-white/10">
                <h3 class="text-astur-yellow font-black uppercase tracking-wider text-sm">Historial Reciente</h3>
                <p class="text-white/50 text-[10px] mt-1" id="log-status">Esperando ingresos...</p>
            </div>
            <div id="access-log" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        </div>
    </div>

    <div id="modal-admin" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-astur-blue uppercase italic">Configuración</h2>
                <span id="admin-total-accesos" class="bg-astur-yellow text-astur-blue px-3 py-1 rounded-full font-bold text-xs">Accesos Hoy: 0</span>
            </div>
            
            <div id="admin-auth">
                <input type="password" id="admin-pass" class="w-full border-4 border-gray-100 p-4 rounded-2xl mb-4 text-center text-2xl font-bold focus:border-astur-blue outline-none transition" placeholder="CLAVE">
                <button onclick="loginAdmin()" class="w-full bg-astur-blue text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition">INGRESAR</button>
                <button onclick="cerrarAdmin()" class="w-full mt-4 text-gray-400 text-xs font-bold uppercase">Cerrar</button>
            </div>

            <div id="admin-controls" class="hidden space-y-4">
                <button onclick="sincronizarSheets()" class="w-full bg-green-600 text-white p-4 rounded-2xl font-bold hover:bg-green-700 shadow-lg flex items-center justify-center gap-2">🔄 Sincronizar Excel</button>
                <input type="file" id="foto-uploader" class="hidden" multiple onchange="procesarFotos(event)">
                <button onclick="document.getElementById('foto-uploader').click()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg flex items-center justify-center gap-2">📸 Importar Fotos</button>
                
                <div class="bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-200">
                    <div class="text-[10px] font-bold text-gray-400 uppercase mb-2">Estado del Hardware</div>
                    <div class="flex justify-between text-xs">
                        <span>Puerta (Sonoff):</span>
                        <span class="text-green-600 font-bold">CONECTADO</span>
                    </div>
                </div>
                <button onclick="cerrarAdmin()" class="w-full bg-gray-100 p-4 rounded-2xl text-gray-600 font-bold uppercase hover:bg-gray-200 transition">Volver al Inicio</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTCyEdIV_bC82uoGFq1mIvJOXrvJI19KzwLVGjxyH8jYefbnHkNorxelpwTTqJ8KczrzoiiZ24dBWFj/pub?output=csv";
        const SONOFF_IP = "192.168.0.228";
        const SONOFF_ID = "10023d09c2";
        
        let sociosDB = [];
        let fotosDB = {};
        let contadorHoy = 0;
        const ES_LOCAL = window.location.protocol === 'file:' || window.location.hostname === 'localhost';
        
        // Sonidos limpios (Notificaciones de sistema)
        const sonidoOk = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const sonidoError = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

        window.onload = () => { sincronizarSheets(); };

        function handleInput(e) {
            if (e.key === "Enter") {
                const val = e.target.value.trim();
                if(val) {
                    validarSocio(val);
                    e.target.value = "";
                }
            }
        }

        async function validarSocio(id) {
            const socio = sociosDB.find(s => s.dni == id || s.numeroSocio == id);
            const display = document.getElementById('display-result');
            const badge = document.getElementById('res-status-badge');
            
            if (!socio) {
                sonidoError.play();
                document.getElementById('view-client').classList.add('shake-error');
                setTimeout(() => document.getElementById('view-client').classList.remove('shake-error'), 500);
                alert("❌ Socio no registrado");
                return;
            }

            // Actualizar Tarjeta
            display.classList.remove('hidden', 'status-success', 'status-error');
            document.getElementById('res-nombre').innerText = socio.nombre;
            document.getElementById('res-dni').innerText = `SOCIO ID: ${socio.numeroSocio} | DNI: ${socio.dni}`;
            document.getElementById('res-foto').src = fotosDB[socio.dni] || 'https://www.w3schools.com/howto/img_avatar.png';

            const esValido = socio.pago.includes("AL DIA") || socio.pago.includes("ACTIVO");

            if (esValido) {
                display.classList.add('status-success');
                badge.innerText = "ACCESO PERMITIDO";
                badge.style.backgroundColor = "#22c55e";
                sonidoOk.play();
                contadorHoy++;
                document.getElementById('admin-total-accesos').innerText = `Accesos Hoy: ${contadorHoy}`;
                
                if (ES_LOCAL) abrirPuertaReal();
                else simularApertura();
            } else {
                display.classList.add('status-error');
                badge.innerText = "PAGO VENCIDO";
                badge.style.backgroundColor = "#ef4444";
                sonidoError.play();
            }

            agregarAlLog(socio, esValido);
            setTimeout(() => display.classList.add('hidden'), 5000);
        }

        async function abrirPuertaReal() {
            const dataOn = { "deviceid": SONOFF_ID, "data": { "switch": "on" } };
            const dataOff = { "deviceid": SONOFF_ID, "data": { "switch": "off" } };
            try {
                await fetch(`http://${SONOFF_IP}:8081/zeroconf/switch`, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataOn) });
                setTimeout(() => {
                    fetch(`http://${SONOFF_IP}:8081/zeroconf/switch`, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataOff) });
                }, 3000);
            } catch (e) { console.error("Error Sonoff:", e); }
        }

        function simularApertura() {
            console.log("🌐 WEB SIMULACIÓN: Puerta abierta");
        }

        function agregarAlLog(socio, exito) {
            const log = document.getElementById('access-log');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const entry = document.createElement('div');
            entry.className = `p-3 rounded-2xl border-l-4 bg-white/5 ${exito ? 'border-green-500' : 'border-red-500'} animate-fade-in`;
            entry.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-white font-bold text-xs truncate w-32 uppercase">${socio.nombre}</span>
                    <span class="text-white/30 text-[9px]">${time}</span>
                </div>
                <div class="text-[9px] font-black uppercase tracking-widest ${exito ? 'text-green-400' : 'text-red-400'}">
                    ${exito ? 'Validado' : 'Denegado'}
                </div>
            `;
            log.prepend(entry);
            document.getElementById('log-status').textContent = `${log.children.length} registros en sesión`;
            if (log.children.length > 15) log.removeChild(log.lastChild);
        }

        async function sincronizarSheets() {
            try {
                document.getElementById('status-indicator').textContent = '🔄 Conectando Excel...';
                const res = await fetch(SHEET_URL + "&t=" + Date.now());
                const csv = await res.text();
                const filas = csv.split(/\r?\n/).slice(1);
                sociosDB = filas.map(f => {
                    const c = f.split(",");
                    return { nombre: c[0]?.trim(), dni: c[1]?.trim(), numeroSocio: c[2]?.trim(), pago: c[3]?.trim().toUpperCase() };
                }).filter(s => s.dni);
                document.getElementById('status-indicator').innerHTML = `✅ ${sociosDB.length} SOCIOS ACTIVOS`;
            } catch (err) {
                document.getElementById('status-indicator').innerHTML = `❌ Error de Conexión`;
            }
        }

        function showAdminLogin() { document.getElementById('modal-admin').classList.remove('hidden'); }
        function cerrarAdmin() { document.getElementById('modal-admin').classList.add('hidden'); }
        function loginAdmin() {
            if(document.getElementById('admin-pass').value === "gym1081") {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('admin-pass').value = "";
            } else { alert("Clave Incorrecta"); }
        }

        function procesarFotos(e) {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                const dni = file.name.split('.')[0];
                reader.onload = (ev) => fotosDB[dni] = ev.target.result;
                reader.readAsDataURL(file);
            });
            alert("Fotos procesadas con éxito");
        }
    </script>
</body>
</html>
