<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTUR GYM - Control de Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --astur-blue: #0066bc;
            --astur-yellow: #f9d71c;
        }
        body { background-color: #f3f4f6; }
        .bg-astur-blue { background-color: var(--astur-blue); }
        .text-astur-yellow { color: var(--astur-yellow); }
        .btn-astur { background-color: var(--astur-yellow); color: var(--astur-blue); font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen" class="flex flex-col items-center justify-center h-screen bg-astur-blue">
    <div class="bg-white p-8 rounded-lg shadow-2xl text-center max-w-sm w-full">
        <h1 class="text-3xl font-black mb-6 text-astur-blue">ASTUR GYM</h1>
        <p class="mb-4">Ingrese clave de administración</p>
        <input type="password" id="admin-pass" class="border-2 border-gray-300 p-2 w-full rounded mb-4 text-center" placeholder="Clave">
        <button onclick="checkLogin()" class="btn-astur w-full py-3 rounded hover:bg-yellow-400 transition">INGRESAR</button>
    </div>
</div>

<div id="main-panel" class="hidden min-h-screen flex flex-col">
    <nav class="bg-astur-blue p-4 text-white flex justify-between items-center shadow-md">
        <span class="font-bold tracking-widest text-astur-yellow text-xl">ASTUR GYM</span>
        <button onclick="location.reload()" class="text-xs bg-red-500 px-2 py-1 rounded text-white">Cerrar Sesión</button>
    </nav>

    <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-astur-blue">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Verificar Acceso</h2>
            <input type="text" id="dni-input" class="w-full border-2 border-gray-200 p-4 rounded text-2xl mb-4" placeholder="DNI o Nº Socio">
            <button onclick="validarSocio()" class="w-full bg-astur-blue text-white py-4 rounded-lg font-bold text-xl hover:bg-blue-700">VERIFICAR</button>
            
            <div id="resultado" class="mt-6 hidden text-center p-6 rounded-lg transition-all">
                <img id="socio-foto" src="" class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-white shadow-md">
                <h3 id="socio-nombre" class="text-2xl font-black"></h3>
                <p id="socio-estado" class="text-lg font-semibold"></p>
                <div id="access-icon" class="text-5xl mt-2"></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-astur-yellow">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Configuración de Base de Datos</h2>
            <div class="space-y-4">
                <button onclick="importarDeGoogleSheets()" class="w-full border-2 border-astur-blue text-astur-blue p-3 rounded font-bold hover:bg-blue-50">
                    🔄 Sincronizar Google Sheets
                </button>
                <input type="file" id="foto-uploader" class="hidden" multiple accept="image/*" onchange="procesarFotos(event)">
                <button onclick="document.getElementById('foto-uploader').click()" class="w-full bg-gray-100 p-3 rounded font-bold border-2 border-dashed border-gray-400 hover:bg-gray-200">
                    📸 Importar Fotos por DNI
                </button>
                <p class="text-xs text-gray-500 italic">* Las fotos deben llamarse "DNI.jpg" (ej: 12345678.jpg)</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración inicial
    const PASS_CORRECTA = "gym1081";
    let sociosDB = []; // Aquí se guardarán los datos del Google Sheet
    let fotosDB = {};  // Diccionario de fotos: { "DNI": "Base64Data" }

    function checkLogin() {
        const pass = document.getElementById('admin-pass').value;
        if(pass === PASS_CORRECTA) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');
        } else {
            alert("Clave incorrecta");
        }
    }

    // Lógica de Acceso
    function validarSocio() {
        const input = document.getElementById('dni-input').value;
        const resDiv = document.getElementById('resultado');
        const socio = sociosDB.find(s => s.dni == input || s.numeroSocio == input);

        resDiv.classList.remove('hidden', 'bg-green-500', 'bg-red-500');
        
        if (socio) {
            document.getElementById('socio-nombre').innerText = socio.nombre;
            document.getElementById('socio-foto').src = fotosDB[socio.dni] || 'https://via.placeholder.com/150';
            
            if (socio.pago === "AL DIA") {
                resDiv.classList.add('bg-green-500', 'text-white');
                document.getElementById('socio-estado').innerText = "ACCESO AUTORIZADO";
                document.getElementById('access-icon').innerText = "🔓";
                abrirPuertaSonoff();
            } else {
                resDiv.classList.add('bg-red-500', 'text-white');
                document.getElementById('socio-estado').innerText = "PAGO VENCIDO / DENEGADO";
                document.getElementById('access-icon').innerText = "🔒";
            }
        } else {
            alert("Socio no encontrado");
        }
    }

    // Conexión con Sonoff (Simulación - requiere Webhook)
    function abrirPuertaSonoff() {
        console.log("Enviando señal a Sonoff...");
        // Aquí iría el fetch a tu API de eWeLink o IFTTT
        // fetch('https://maker.ifttt.com/trigger/abrir_puerta/with/key/TU_CLAVE');
    }

    // Gestión de Fotos
    function procesarFotos(event) {
        const files = event.target.files;
        for (let file of files) {
            const reader = new FileReader();
            const dni = file.name.split('.')[0];
            reader.onload = (e) => {
                fotosDB[dni] = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        alert("Fotos procesadas correctamente");
    }

    // Función para Google Sheets (Simulada para este ejemplo)
    function importarDeGoogleSheets() {
        // En una app real, aquí usarías la URL de tu Google Sheet publicada como CSV
        alert("Conectando con Google Sheets...");
        // Ejemplo de estructura de datos
        sociosDB = [
            { dni: "123", nombre: "Juan Perez", pago: "AL DIA", numeroSocio: "001" },
            { dni: "456", nombre: "Maria Lopez", pago: "VENCIDO", numeroSocio: "002" }
        ];
        console.log("Socios cargados:", sociosDB);
    }
</script>

</body>
</html>
