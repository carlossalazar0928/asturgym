<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTUR GYM - Control de Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --astur-blue: #0066bc; --astur-yellow: #f9d71c; }
        body { background-color: var(--astur-blue); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .astur-gradient { background: linear-gradient(135deg, var(--astur-blue) 0%, #004a87 100%); }
        .access-card { transition: all 0.5s ease-in-out; }
        .status-success { background-color: #22c55e; border-color: #16a34a; }
        .status-error { background-color: #ef4444; border-color: #dc2626; }
    </style>
</head>
<body class="astur-gradient flex items-center justify-center min-h-screen">

    <div id="view-client" class="text-center w-full max-w-4xl px-4">
        <img src="https://i.ibb.co/svknfxSq/541227282-18045312167644134-5085573338939708126-n.jpg" alt="Astur Gym Logo" class="w-48 mx-auto mb-6 drop-shadow-lg">
        <h1 class="text-5xl font-black text-astur-yellow mb-8 tracking-tighter italic">ASTUR GYM</h1>
        
        <div class="bg-white/10 backdrop-blur-md p-10 rounded-3xl shadow-2xl border border-white/20">
            <p class="text-white text-xl mb-4">IDENTIFÍQUESE (DNI / QR / Nº SOCIO)</p>
            <input type="text" id="main-input" autofocus 
                class="w-full bg-white text-astur-blue text-5xl font-bold text-center py-6 rounded-2xl border-4 border-astur-yellow focus:outline-none shadow-inner"
                placeholder="00000000" onkeyup="handleInput(event)">
            
            <div id="display-result" class="hidden mt-8 p-8 rounded-2xl access-card border-4 animate-bounce">
                <div class="flex items-center justify-around">
                    <img id="res-foto" src="" class="w-48 h-48 rounded-2xl object-cover border-4 border-white shadow-xl">
                    <div class="text-left text-white">
                        <h2 id="res-nombre" class="text-4xl font-black uppercase"></h2>
                        <p id="res-dni" class="text-xl opacity-80"></p>
                        <p id="res-status-text" class="text-3xl font-bold mt-2"></p>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="showAdminLogin()" class="mt-10 text-white/30 hover:text-astur-yellow transition font-bold">ACCESO ADM</button>
    </div>

    <div id="modal-admin" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-astur-blue mb-4">Panel de Administración</h2>
            <div id="admin-auth">
                <input type="password" id="admin-pass" class="w-full border-2 p-3 rounded mb-4" placeholder="Clave:">
                <button onclick="loginAdmin()" class="w-full bg-astur-blue text-white py-3 rounded font-bold">ENTRAR</button>
            </div>
            <div id="admin-controls" class="hidden space-y-4">
                <button onclick="sincronizarSheets()" class="w-full bg-green-600 text-white p-3 rounded">🔄 Sincronizar Google Sheets</button>
                <input type="file" id="foto-uploader" class="hidden" multiple onchange="procesarFotos(event)">
                <button onclick="document.getElementById('foto-uploader').click()" class="w-full bg-blue-600 text-white p-3 rounded">📸 Importar Fotos (DNI.jpg)</button>
                <button onclick="cerrarAdmin()" class="w-full bg-gray-200 p-3 rounded text-gray-700">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTCyEdIV_bC82uoGFq1mIvJOXrvJI19KzwLVGjxyH8jYefbnHkNorxelpwTTqJ8KczrzoiiZ24dBWFj/pub?output=csv";
        const SONOFF_ID = "10023d09c2";
        let sociosDB = [];
        let fotosDB = {};

        // 1. Manejo de Entrada (DNI o QR)
        function handleInput(e) {
            if (e.key === "Enter") {
                validarSocio(e.target.value);
                e.target.value = ""; // Limpiar para el siguiente
            }
        }

        async function validarSocio(id) {
            const socio = sociosDB.find(s => s.dni == id || s.numeroSocio == id);
            const display = document.getElementById('display-result');
            
            if (!socio) {
                alert("Socio no registrado");
                return;
            }

            // Mostrar Datos
            display.classList.remove('hidden', 'status-success', 'status-error');
            document.getElementById('res-nombre').innerText = socio.nombre;
            document.getElementById('res-dni').innerText = "DNI: " + socio.dni;
            document.getElementById('res-foto').src = fotosDB[socio.dni] || 'document.getElementById('res-foto').src = fotosDB[socio.dni] || 'https://www.w3schools.com/howto/img_avatar.png';';

            if (socio.pago.includes("AL DIA") || socio.pago.includes("ACTIVO")) {
                display.classList.add('status-success');
                document.getElementById('res-status-text').innerText = "✅ ACCESO PERMITIDO";
                abrirPuerta();
            } else {
                display.classList.add('status-error');
                document.getElementById('res-status-text').innerText = "❌ ACCESO DENEGADO";
            }

            // Ocultar mensaje después de 4 segundos
            setTimeout(() => display.classList.add('hidden'), 4000);
        }

        // 2. Acción Sonoff
async function abrirPuerta() {
    const SONOFF_IP = "192.168.0.228";
    const DEVICE_ID = "10023d09c2";
    
    // El Sonoff Mini es muy estricto con este formato
    const dataOn = {
        "deviceid": DEVICE_ID,
        "data": { "switch": "on" }
    };

    const dataOff = {
        "deviceid": DEVICE_ID,
        "data": { "switch": "off" }
    };

    console.log("🚀 Enviando pulso de apertura...");

    try {
        // Usamos una técnica llamada 'keepalive' para asegurar que llegue
        await fetch(`http://${SONOFF_IP}:8081/zeroconf/switch`, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(dataOn)
        });

        console.log("✅ ON enviado");

        // El perno necesita unos segundos para que la persona pase
        setTimeout(async () => {
            await fetch(`http://${SONOFF_IP}:8081/zeroconf/switch`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(dataOff)
            });
            console.log("🔒 OFF enviado (Perno cerrado)");
        }, 3000);

    } catch (error) {
        console.error("Error de red local:", error);
    }
}
        // 3. Funciones Admin
        function showAdminLogin() { document.getElementById('modal-admin').classList.remove('hidden'); }
        function cerrarAdmin() { document.getElementById('modal-admin').classList.add('hidden'); }
        
        function loginAdmin() {
            if(document.getElementById('admin-pass').value === "gym1081") {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
            }
        }

async function sincronizarSheets() {
    try {
        const res = await fetch(SHEET_URL + "&cachebuster=" + new Date().getTime()); // Evita que la PC guarde una versión vieja
        const csv = await res.text();
        
        // Dividimos por líneas y limpiamos espacios o retornos de carro (\r)
        const filas = csv.split(/\r?\n/).slice(1); 
        
        sociosDB = filas.map(f => {
            const c = f.split(",");
            // Limpiamos cada celda de espacios en blanco a los costados
            return { 
                nombre: c[0]?.trim() || "", 
                dni: c[1]?.trim() || "", 
                numeroSocio: c[2]?.trim() || "", 
                pago: c[3]?.trim().toUpperCase() || "" 
            };
        }).filter(s => s.dni !== ""); // Ignoramos filas vacías

        console.log("Base de datos cargada con éxito:", sociosDB);
        alert(`Sincronizado: ${sociosDB.length} socios listos.`);
    } catch (err) {
        console.error("Error cargando el Excel:", err);
        alert("No se pudo conectar con el Excel. Verifica internet.");
    }
}

        function procesarFotos(e) {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                const dni = file.name.split('.')[0];
                reader.onload = (ev) => fotosDB[dni] = ev.target.result;
                reader.readAsDataURL(file);
            });
            alert("Fotos vinculadas");
        }

        // Carga inicial
        window.onload = sincronizarSheets;
    </script>
</body>
</html>
